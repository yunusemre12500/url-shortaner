apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
buildMetadata:
  - managedByLabel
images:
  - name: ghcr.io/yunusemre12500/url-shortaner/api-server
    newTag: 0.1.0
labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/component: api-server
      app.kubernetes.io/instance: url-shortaner-api-server
      app.kubernetes.io/name: url-shortaner-api-server
      app.kubernetes.io/part-of: url-shortaner
  - pairs:
      app.kubernetes.io/version: 0.1.0
namespace: development
resources:
  - ../../base
